
<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unity Group - Mitra Strategis Bisnis Anda</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Added Cinzel for Logo Font matching -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Midtrans Snap JS (Sandbox Mode) -->
    <script type="text/javascript"
      src="https://app.sandbox.midtrans.com/snap/snap.js"
      data-client-key="SB-Mid-client-DEMO_KEY_HERE">
    </script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              // Font baru untuk Logo Text
              serif: ['Cinzel', 'serif'],
            },
            colors: {
              gold: {
                100: '#F9E79F',
                200: '#F7DC6F',
                300: '#F4D03F',
                400: '#F1C40F',
                500: '#D4AC0D',
                600: '#B7950B',
                700: '#9A7D0A',
              },
              slate: {
                950: '#020617', 
              }
            },
            animation: {
              'blob': 'blob 7s infinite',
              'pulse-glow': 'pulse-glow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'fade-in': 'fadeIn 0.8s ease-out forwards',
              'fade-in-down': 'fadeInDown 0.5s ease-out forwards',
              'fade-in-up': 'fadeInUp 0.5s ease-out forwards',
            },
            keyframes: {
              blob: {
                '0%': { transform: 'translate(0px, 0px) scale(1)' },
                '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                '100%': { transform: 'translate(0px, 0px) scale(1)' },
              },
              'pulse-glow': {
                '0%, 100%': { opacity: '1', boxShadow: '0 0 20px rgba(234, 179, 8, 0.5)' },
                '50%': { opacity: '.9', boxShadow: '0 0 10px rgba(234, 179, 8, 0.2)' },
              },
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              fadeInDown: {
                '0%': { opacity: '0', transform: 'translateY(-20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #020617;
        color: white;
        margin: 0;
        scrollbar-width: thin;
        scrollbar-color: #D4AC0D #020617;
      }
      
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #020617;
      }
      ::-webkit-scrollbar-thumb {
        background: linear-gradient(to bottom, #D4AC0D, #9A7D0A);
        border-radius: 10px;
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      
      #initial-loader {
        position: fixed;
        inset: 0;
        background-color: #020617;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }

      .loader-spinner {
        width: 60px;
        height: 60px;
        border: 2px solid rgba(234, 179, 8, 0.1);
        border-radius: 50%;
        border-top-color: #EAB308;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      /* Utility text glow for luxury feel */
      .text-glow {
        text-shadow: 0 0 20px rgba(234, 179, 8, 0.3);
      }

      /* Custom Scrollbar for internal containers */
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(234, 179, 8, 0.5);
        border-radius: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: rgba(234, 179, 8, 0.8);
      }

      .page-transition {
        animation: fadeIn 0.5s ease-out;
      }
    </style>
</head>
  <body>
    <div id="root">
        <div id="initial-loader">
            <div class="loader-spinner"></div>
            <p style="margin-top: 24px; color: #EAB308; font-family: 'Cinzel', serif; font-size: 14px; letter-spacing: 4px; text-transform: uppercase; font-weight: 700;">Unity Group Luxury</p>
        </div>
    </div>
    <script type="module" src="/index.tsx"></script>
    <script>
      // Safety timeout in case React fails to mount or crash
      setTimeout(() => {
        const loader = document.getElementById('initial-loader');
        if (loader) {
           // Check if root is empty (React didn't render)
           const root = document.getElementById('root');
           if (root && root.children.length <= 1) { // Only loader is inside
               console.warn("App failed to mount, removing loader to show potential errors");
               loader.style.display = 'none';
               // Optional: Show an error message on screen
               const errorDiv = document.createElement('div');
               errorDiv.style.color = 'white';
               errorDiv.style.textAlign = 'center';
               errorDiv.style.marginTop = '50px';
               errorDiv.innerHTML = '<p>Gagal memuat aplikasi. Silakan refresh halaman.</p>';
               document.body.appendChild(errorDiv);
           }
        }
      }, 8000); // 8 seconds timeout
    </script>
  </body>
</html>
